version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: devflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devflow_password}
      POSTGRES_DB: ${POSTGRES_DB:-devflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - devflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow -d devflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devflow_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devflow_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: devflow_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=${PROJECT_NAME:-DevFlow}
      - API_V1_STR=${API_V1_STR:-/api/v1}
      - SECRET_KEY=${SECRET_KEY:-9a15f03d5267bb56c28f9d6c4d4be5c2cebb910609ea8b584d4fa7ba9b14b872}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-devflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devflow_password}
      - POSTGRES_DB=${POSTGRES_DB:-devflow}
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-mock_client_id}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-mock_client_secret}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-http://localhost:3000/api/auth/callback/github}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-ZTMxYzg5NmFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTI=}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devflow_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: devflow_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devflow_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://localhost:3000/', (res) => { if (res.statusCode >= 200 && res.statusCode < 400) process.exit(0); else process.exit(1); })\""]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  devflow_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
